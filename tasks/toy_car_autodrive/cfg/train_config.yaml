# 自动驾驶玩具车训练配置

# 数据集配置
data:
  root_dir: /CodeRepo/Code/dwwang16/dataset/toy_car_road
  input_size: 160
  num_classes: 3  # background, road, obstacle

# 模型配置
model:
  name: RoadSegNet
  backbone: mobilenet_v2
  pretrained: false

# 训练配置
train:
  epochs: 50
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001

  # 优化器
  optimizer: AdamW
  scheduler: CosineAnnealingLR
  min_lr: 0.000001

  # 损失函数
  loss:
    seg_weight: 1.0
    dice_weight: 0.5
    decision_weight: 0.3

# 设备配置
device: cuda
num_workers: 4

# 输出配置
output:
  dir: runs/toy_car
  save_interval: 5
  log_interval: 10

# 评估配置
eval:
  batch_size: 8
  save_vis: true