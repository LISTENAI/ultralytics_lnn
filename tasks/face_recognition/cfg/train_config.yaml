# Face Detection and Recognition Training Configuration

# 训练配置
training:
  epochs: 80
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 42

# 优化器配置
optimizer:
  type: AdamW
  lr: 0.001
  betas: [0.9, 0.999]
  eps: 1.0e-8

# 学习率调度
scheduler:
  type: CosineAnnealingLR
  T_max: 80
  eta_min: 1.0e-6

# 图像配置
image:
  input_size: 224
  rgb: true
  normalize: true

# 人脸检测配置
detector:
  num_classes: 1  # 只检测人脸
  anchor_sizes: [[32], [64], [128], [256]]  # 多尺度检测
  score_threshold: 0.5
  nms_threshold: 0.4

# 人脸特征提取配置
embedder:
  embedding_dim: 128  # 人脸特征维度
  dropout: 0.3
  margin: 0.2  # ArcFace margin
  scale: 30.0  # ArcFace scale

# 损失函数配置
loss:
  detector:
    alpha: 0.5
    type: FocalLoss  # Focal Loss for detection
  embedder:
    type: ArcFaceLoss  # Angular Margin Loss
    loss_weight: 1.0

# 输出配置
output:
  dir: runs/face_recognition
  save_freq: 5
  log_freq: 1