# QR Code Detection Dataset Configuration

dataset:
  name: QRCode Detection Dataset
  type: detection

# Paths
paths:
  data_root: /CodeRepo/Code/dwwang16/dataset/qrcode_detection
  train_images: train/images
  train_labels: train/labels
  val_images: val/images
  val_labels: val/labels
  test_images: test/images
  test_labels: test/labels

# Classes
nc: 1
names:
  0: qrcode

# Image Settings
image:
  format: jpg
  channels: 3

# Annotation Format
annotation:
  format: yolo  # bounding box format
  # class_id x_center y_center width height (normalized 0-1)

# Data Augmentation
augmentation:
  enabled: true
  horizontal_flip: true
  rotation: true  # 0, 90, 180, 270
  scale: [0.8, 1.2]
  brightness: 0.2
  contrast: 0.2
  noise: 0.1
  blur: 0.1